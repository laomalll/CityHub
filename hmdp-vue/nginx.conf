worker_processes  1;

pid        logs/nginx.pid;
error_log  logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;

    upstream backend {
        server 127.0.0.1:8081 max_fails=5 fail_timeout=10s weight=1;
        server 127.0.0.1:8082 max_fails=5 fail_timeout=10s weight=1;
    }

    server {
        listen       8000;
        server_name  localhost;

        # Vue production files and Vue Router history fallback.
        location / {
            root       dist;
            index      index.html;
            try_files  $uri $uri/ /index.html;
        }

        # UploadController writes blog images to hmdp-vue/imgs.
        location /imgs/blogs/ {
            alias E:/code/hm-dianping/hmdp-vue/imgs/blogs/;
        }

        location /imgs/comments/ {
            alias E:/code/hm-dianping/hmdp-vue/imgs/comments/;
        }

        # Compatible with old image records that store /blogs/... directly.
        # Restrict this rule to image files so it cannot intercept Vue routes
        # such as /blogs/4/.
        location ~* ^/blogs/(.+\.(?:jpg|jpeg|png|gif|webp))$ {
            alias E:/code/hm-dianping/hmdp-vue/imgs/blogs/$1;
        }

        # Keep exactly the same /api contract used by the legacy frontend.
        location /api {
            default_type               application/json;
            keepalive_timeout          30s;
            keepalive_requests         1000;
            proxy_http_version         1.1;
            proxy_pass_request_headers on;
            proxy_next_upstream        error timeout;
            rewrite                    /api(/.*) $1 break;
            proxy_pass                 http://backend;
        }
    }
}
